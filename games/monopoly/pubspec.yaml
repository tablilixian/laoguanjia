name: monopoly_game
description: "地产大亨 - 经典桌游Monopoly移动版"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/icons/
    - assets/images/backgrounds/
    - assets/images/properties/
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/fonts/
