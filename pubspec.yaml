name: home_manager
description: "家庭管理应用 - 任务、购物、日历、账单、资产"
publish_to: 'none'
version: 1.0.13+8

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^14.2.0
  
  # Backend
  supabase_flutter: ^2.5.0
  
  # Utils
  intl: any
  uuid: ^4.4.0
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  path: ^1.8.3
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  
  # AI
  google_generative_ai: ^0.2.0
  
  # UI
  flex_color_scheme: ^8.2.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  
  # Video Player
  better_player_plus: ^1.0.8

  # TTS
  flutter_tts: ^3.1.1
  
  # Image
  image_picker: ^1.0.4
  flutter_image_compress: ^2.0.4
  
  # Local Database
  drift: ^2.14.1
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.18

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  
  # Code Generation
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  drift_dev: ^2.14.1

flutter:
  uses-material-design: true
